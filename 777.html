<img src='p.8.png'> 바로 \"큰일 났어요.\"였습니다. 새로운 업무를 맡거나 예상하지 못한 상황을 마주할 때면, 저도 모르게 이 말부터 먼저 나오곤 했습니다. 그러면 신기하게도 손정현 선생님은 늘 같은 대답을 해주셨습니다. \"무슨 일이에요?\"\n\n그 한마디를 들으면 복잡했던 머릿속이 조금씩 정리되기 시작했습니다. 함께 상황을 살펴보고, 하나씩 방법을 찾아가다 보면 어느새 큰일이라고 생각했던 일도 해결되어 있었습니다.\n\n그런 날들이 반복되면서 문득 이런 생각이 들었습니다. '나는 왜 문제를 만나면 해결보다 걱정을 먼저 하고 있을까?' 돌아보니 저는 문제를 해결하는 방법보다, 문제를 마주하는 경험이 부족했던 사람이었습니다. 조금만 낯선 일이 생겨도 자신감보다 불안이 앞섰고, 혼자 고민하기보다 누군가의 답을 먼저 찾고 있었습니다.\n\n그래서 이번에는 해결책을 찾는 대신, 시선을 바꿔 보기로 했습니다. '어떻게 해결하지?'가 아니라, '왜 이런 상황이 생겼을까?', '이 안에서 나는 무엇을 배울 수 있을까?'

<img src='p.9.png'>
그 질문에 답을 찾기 위해 공부를 시작했습니다. 구슬꿰는실의 「사례관리 사회사업 실천 사례 100편 읽기 모임」에 참여했고, 푸른복지 배움터에서 양원석 선생님의 강의를 들었습니다.\n\n책을 읽고 강의를 듣는다고 갑자기 모든 문제가 쉬워진 것은 아니었습니다. 하지만 한 가지는 분명히 달라졌습니다.\n\n예전에는 문제를 만나면 답을 찾으려고 했다면, 지금은 이유를 이해하려고 합니다. 예전에는 누군가의 해결 방법을 배우려고 했다면, 지금은 그 사람이 왜 그렇게 생각했는지를 배우려고 합니다. 조금씩 시선이 달라지자 문제도 이전과는 다른 모습으로 보이기 시작했습니다.\n\n여전히 저는 가끔 \"큰일 났어요.\"를 외칩니다. 아직은 배워야 할 것도, 경험해야 할 것도 많기 때문입니다. 하지만 이제는 그 말의 끝이 예전과는 다릅니다. \"큰일 났어요.\" 그리고 이어서 스스로에게 묻습니다. '이번에는 무엇을 배울 수 있을까?'\n\n아마 사회복지사는 문제를 해결하는 사람이 아니라, 문제 너머에 있는 사람과 가능성을 발견하는 사람인지도 모르겠습니다. 그래서 앞으로도 저는 답을 찾기보다 먼저 질문하는 사회복지사로, 그리고 배우기를 멈추지 않는 사회복지사로 성장해 가고 싶습니다.` }, 
        { title: "EP.4 관계의 가능성 발견하기", excerpt: "작은 인사와 관심이 관계의 시작이 된다는 것을 배우다.", text: `이번 주 주제는 '관계의 가능성 발견하기', 그리고 온보딩 한 달 차를 돌아보는 시간입니다.\n\n어느덧 번오마을과 함께한 지도 두 달이 되어가고 있습니다. 어느 날 문득 이런 생각이 들었습니다. \"지난 한 달 동안 나에게 가장 많이 남은 것은 무엇이었을까?\" 그 답을 찾기 위해 저는 다시 한번 사진첩을 열어보았습니다.\n\n처음 온보딩 발표를 준비했을 때와는 또 다른 장면들이 사진 속에 담겨 있었습니다.\n <img src='p.10.png'>첫 번째 사진은 입사 후 약 2주 차, 손정현 선생님과 함께 마을을 걷던 날 촬영한 사진입니다. 산책을 하던 중 우연히 눈에 들어온 문구가 마치 그 당시의 저에게 꼭 필요한 말처럼 느껴졌습니다. 그래서 사진을 찍었는데, 알고 보니 바로 옆에 계시던 어르신의 집 앞이었습니다.\n\n그 순간 어르신도, 손정현 선생님도, 저도 모두 당황했던 기억이 납니다. 그때는 그저 민망했던 해프닝이라고 생각했습니다. 하지만 지금 다시 돌아보니, 그날의 작은 사건도 결국 한 사람과 마주 보고 함께 웃을 수 있었던 관계의 시작이었습니다.\n\n그렇게 한 달이 지나고, 저도 조금씩 번오마을에 스며들고 있었습니다. 매주 진행되는 온보딩 발표도 어느새 익숙해졌습니다. 처음에는 제가 경험한 것들을 나누고 한 주를 돌아볼 수 있다는 점이 즐겁고 설레게 느껴졌습니다. \n
<img src='p.11.png'> 하지만 시간이 지날수록 부담도 함께 커졌습니다.발표를 준비하기 위해 한 주를 더 꼼꼼히 돌아보게 되었고, 때로는 이 발표가 저를 평가하는 기준처럼 느껴지기도 했습니다. 

<img src='p.12.png'>그러던 중 걷기모임 어머님들과 함께 마을을 걸을 기회가 있었습니다. 어머님들께서는 새로운 담당자가 와서 반갑다며 먼저 인사를 건네주셨고, 실습생 시절 함께 인사 캠페인을 진행했던 학생이 아니냐며 저를 기억해 주시는 분도 계셨습니다. 그 순간 저는 관계는 하루아침에 만들어지는 것이 아니라는 사실을 다시 한번 느꼈습니다.\n\n예전에 스쳐 지나갔던 인연이 다시 이어지기도 하고, 짧은 인사 한마디가 새로운 관계의 시작이 되기도 했습니다. 두 번째 사진은 경로식당 출석체크를 하던 날의 모습입니다. 아직 모든 어르신들의 성함을 외우지 못했기에, 이름을 여쭤보며 제 이름도 함께 알려드리고 싶었습니다. 

그래서 작은 이름표 하나를 만들어 옷에 붙이고 출석체크를 시작했습니다. 어르신들께서는 이름표를 보시며 제 이름을 불러주시기도 하고, 귀엽다며 웃어주시기도 했습니다. 이름표 하나 붙였을 뿐인데, 그 작은 변화가 어르신들과 한 걸음 더 가까워질 수 있는 계기가 되었습니다.\n\n그 경험을 통해 저는 관계는 거창한 것에서 시작되는 것이 아니라는 것을 배웠습니다. 먼저 인사를 건네는 것, 상대방의 이름을 기억하려고 노력하는 것, 그리고 한 번 더 바라보는 작은 관심에서 관계는 시작된다는 것을 알게 되었습니다.\n
<img src='p.13.png'>
마지막 사진은 지난주 목요일 점심시간에 촬영한 사진입니다. 원래는 햇빛을 피하려고 챙겨 나간 양산이었는데, 횡단보도를 건너자마자 쏟아진 소나기에 어느새 우산이 되어주고 있었습니다. 

신발도 옷도 모두 젖을 만큼 많은 비가 내렸지만, 주임님께서 단체방에 남기신 \"SOS!\" 한마디에 모두가 웃음을 터뜨렸던 기억이 더 오래 남아있습니다. 사진을 다시 돌아보며 깨달았습니다. 지난 한 달 동안 가장 오래 기억에 남은 순간들은 대부분 사람과 사람 사이에서 만들어진 장면들이었다는 것을.\n\n어르신들과 나눈 인사, 동료들과 함께 웃었던 순간, 마을에서 우연히 이어진 인연까지. 처음에는 업무를 배우고 적응하는 데 집중했다면, 이제는 그 안에서 사람을 발견하고 관계를 만들어가는 즐거움을 조금씩 알아가고 있습니다. 사진 한 장에는 그날의 풍경만 담기는 것이 아니라, 그날 함께했던 사람들과 관계의 흔적도 함께 담긴다는 것을 이번 한 달을 통해 배울 수 있었습니다.\n\n앞으로도 저는 번오마을에서 다양한 사람들과의 만남 속에 담긴 관계의 가능성을 발견하고, 그 인연을 소중히 이어가는 사회복지사로 성장하고 싶습니다.` },  
{ title: "EP.5 조직, 함께라는 힘을 발견하기", excerpt: "혼자가 아닌 함께할 때 더 큰 힘이 만들어진다는 것을 경험하다.", media: "ep5.jpg", text: "지난 한 주를 돌아보며 가장 먼저 떠오른 장면은 바로 ‘처음으로 진행했던 경로식당 생신잔치’였습니다.\n\n생신잔치를 준비하면서 저는 나름대로 철저히 준비했다고 생각했습니다. 이채연 선생님의 진행 방식을 여러 번 살펴보고, 대본도 직접 작성해 연습했습니다. 혹시 놓치는 부분은 없을지 이것저것 점검하며 행사 당일을 맞이했습니다.\n\n하지만 막상 시작해 보니 준비했던 것과는 다른 상황들이 계속해서 이어졌습니다. 예상하지 못했던 음향 문제가 발생했고, 계획했던 순서도 조금씩 달라졌습니다.\n\n순간순간 긴장했고, 당황하기도 했습니다. 행사가 끝난 뒤 가장 먼저 들었던 생각은 단 하나였습니다. \"오늘 정말 다사다난했다.\"\n\n<video src='v.2.mp4' controls></video>그렇게 하루를 마무리하고 있었는데, 동료 선생님들께서 하나둘 사진과 영상을 보내주셨습니다. 저는 그 영상을 보며 생신잔치 당시에는 미처 보지 못했던 장면들을 하나씩 발견하게 되었습니다.\n\n예상치 못한 음향 문제를 함께 해결해 주셨던 단지플랫폼 선생님들. 바쁜 업무 중에도 사무실에서 내려와 큰 박수로 응원해 주시고 사진과 영상을 남겨주셨던 타팀 선생님들. 조리실 밖으로 나와 제 첫 생신잔치를 함께 지켜봐 주셨던 식당 식구들. 그리고 행사가 원활하게 진행될 수 있도록 가장 가까운 곳에서 함께해 주셨던 김윤중 선생님까지.\n\n사실은 많은 분들이 각자의 자리에서 함께 만들어 주고 계셨다는 것을 뒤늦게 알게 되었습니다. 그 순간 문득 이런 생각이 들었습니다. '조직이란 무엇일까?'\n\n입사 전 저는 조직을 같은 공간에서 함께 일하는 사람들의 모임 정도로 생각했습니다. 하지만 번오마을에서 함께하며 제가 만난 조직은 조금 달랐습니다. 누군가 어려움을 겪으면 자연스럽게 손을 내밀어 주고, 빈자리를 채워 주며, 각자의 역할은 다르지만 같은 목표를 향해 함께 움직이는 사람들이 바로 조직이었습니다.\n\n<img src='p.14.png'>이 사진에도 그런 이야기가 담겨 있습니다. 강당에서 후원품을 함께 옮기던 모습을 보신 김하나 팀장님께서 \"완전 어벤져스 같아요 ~.\"라고 말씀해 주셨고, 그 말을 들은 이재연 선생님께서 AI를 활용해 이 사진을 만들어 주셨습니다. 한 장의 사진이었지만, 그 안에는 서로의 역할을 믿고 함께 움직이는 우리 조직의 모습이 그대로 담겨 있었습니다.\n\n그리고 이러한 모습은 직원들 사이에서만 발견되는 것이 아니었습니다. 경로식당 어르신들 역시 하나의 조직이었습니다.\n\n\"이번 달 생일이었어? 축하해.\" \"오늘 꼬깔모자 쓰겠네.\" 잔치가 끝날 뒤에는 \"즐거운 생신잔치 만들어줘서 고마워.\" \"어제 정말 수고 많았어.\"라며 먼저 담당자인 저를 격려해 주셨습니다.\n\n행사를 함께 즐기고, 서로를 응원하며, 담당자를 믿고 함께해 주시는 모습 속에서 저는 어르신들 역시 같은 목표를 향해 함께 만들어 가는 조직이라는 것을 느낄 수 있었습니다.\n\n이번 한 주를 통해 저는 조직은 단순히 업무로 연결된 관계가 아니라는 것을 배웠습니다.\n\n서로를 신뢰하고, 서로의 부족한 부분을 자연스럽게 채워 주며, 함께 같은 방향을 바라볼 때 비로소 조직은 만들어진다는 것을 알게 되었습니다.\n\n앞으로 저 역시 번오마을의 한 구성원으로서 동료들을 신뢰하고, 주민을 신뢰하며, 누군가에게 도움을 받는 사람을 넘어 다른 사람을 든든하게 도울 수 있는 동료로 성장하고 싶습니다." },
        { title: "EP.6 변화와 성장 발견하기", excerpt: "실행하고 돌아보는 과정 속에서 성장은 자연스럽게 따라온다.", text: `이번 이야기는 「변화와 성장 발견하기」입니다.<video src='v.3.mp4' controls></video>지난주 화요일, 저는 첫 급식지원사업 상반기 지도점검을 준비하고 진행했습니다. 앞선 영상은 지도점검 당일 제 하루를 담은 짧은 기록입니다.\n\n영상을 보다보니 수백 장의 서류를 정리하고, 하나하나 확인하며, 손정현 선생님과 영양사님과 함께 늦은 시간까지 준비했던 순간들이 자연스럽게 떠올랐습니다.\n\n처음 지도점검을 맡았을 때의 마음은 솔직히 두려움이 더 컸습니다. 무엇부터 시작해야 할지, 혹시 놓치는 것은 없을지, 잘 해낼 수 있을지 걱정이 앞섰습니다.\n\n그때 문득 이채연 선생님께서 해주셨던 말씀이 떠올랐습니다. \"일단 해보면 알아요. 부딪히면서 배우는 게 더 쉬워요.\" 그 한마디는 망설이던 저를 움직이게 만든 작은 용기가 되었습니다.\n\n그래서 완벽하게 준비된 뒤 시작하는 대신, 하나씩 부딪혀 보기로 했습니다. 그 과정에서 저는 생각했던 것보다 많은 것들을 배우게 되었습니다.\n\n<img src='p.15.png'>지류 서류를 정리하면서 평소에는 알지 못했던 어르신들의 이용 과정과 사업의 흐름을 더 깊이 이해하게 되었고, 전자도서관 업로드를 준비하며 헤이진을 비롯한 다양한 프로그램도 직접 다뤄볼 수 있었습니다.\n\n하지만 이번 경험에서 가장 크게 남은 것은 새로운 업무를 배우는 것보다 업무를 수행하는 방식을 배우게 되었다는 점이었습니다. 김아영 과장님께서는 업무가 지금 어느 단계까지 진행되었는지 한눈에 볼 수 있도록 업무 과정을 도식화하는 방법을 알려주셨습니다.\n\n<img src='p.16.png'>계획을 세우고, 실행하고, 점검하고, 다시 개선하는 흐름. 돌아보니 그것은 학교에서 배웠던 PDCA 사이클을 현장에서 직접 경험하는 시간이었습니다.\n\n이전까지 저는 새로운 업무를 맡으면 늘 결과부터 걱정했습니다. '잘할 수 있을까?', '실수하면 어떡하지?' 그래서 시작하기도 전에 고민이 더 길어질 때가 많았습니다.\n\n하지만 이번 지도점검은 제게 다른 방법을 알려주었습니다. 완벽해서 시작하는 것이 아니라, 시작하면서 배우는 것. 계획을 세우고 실행해 보고, 부족한 부분을 점검하며 조금씩 더 나아지는 것. 그 과정 자체가 성장이라는 사실을 몸으로 느끼게 되었습니다.\n\n돌이켜보면 이번 지도점검은 단순히 서류를 준비했던 업무가 아니었습니다. 제가 일을 바라보는 방식이 조금씩 바뀌기 시작한 시간이었습니다.\n\n앞으로도 새로운 업무를 마주할 때 두려움 때문에 멈추기보다 먼저 한 걸음 내딛어 보겠습니다. 계획하고, 실행하고, 점검하고, 다시 개선하는 과정을 반복하며 작은 변화를 차곡차곡 쌓아가겠습니다.\n\n그리고 그 변화들이 모여 언젠가는 어떤 일이든 두려움보다 기대를 먼저 품을 수 있는 사회복지사로 성장해 있기를 바랍니다.` },
