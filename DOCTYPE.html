<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ZOOM : ONBOARDING ARCHIVE</title>
    <style>
        :root { --ivory: #F8F6F2; --gray: #666666; --charcoal: #222222; }
        body { background: var(--ivory); color: var(--charcoal); font-family: 'Pretendard', sans-serif; margin: 0; }
        #hero-view, #gallery-view, #detail-view { min-height: 100vh; padding: 80px 15%; box-sizing: border-box; }
        #hero-view { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        h1 { font-size: 5rem; font-weight: 300; margin: 0; }
        #detail-title { font-size: 2.5rem; font-weight: 400; margin-bottom: 40px; text-align: center; }
        .small-subtitle { font-size: 1rem; color: var(--gray); letter-spacing: 2px; margin-bottom: 10px; text-transform: uppercase; }
        #begin-btn { margin-top: 50px; padding: 15px 40px; border: 1px solid var(--charcoal); cursor: pointer; transition: 0.3s; background: transparent; font-size: 1rem; }
        #begin-btn:hover { background: var(--charcoal); color: var(--ivory); }
        #gallery-view { display: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 50px; }
        .card { background: white; padding: 30px; border-radius: 20px; cursor: pointer; border: 1px solid #eee; transition: 0.3s; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        #detail-view { display: none; }
        .back-btn { cursor: pointer; margin-bottom: 30px; text-decoration: underline; color: var(--gray); display: inline-block; }
        .content-body { font-size: 1.2rem; line-height: 1.8; color: #333; max-width: 800px; margin: 0 auto; white-space: pre-wrap; }
        img, video { width: 100%; border-radius: 20px; margin-bottom: 30px; display: block; }
        b { color: var(--charcoal); font-weight: 700; }
    </style>
</head>
<body>

<div id="hero-view">
    <div class="small-subtitle">Onboarding Archive</div>
    <h1>ZOOM - 집중하면 보이는 것들</h1>
    <button id="begin-btn">Begin Exhibition →</button>
</div>

<div id="gallery-view">
    <div class="back-btn" id="home-back-btn">← 홈으로</div>
    <h2 style="font-size: 2.5rem; text-align: center;">Bun5_in_승연</h2>
    <div class="grid" id="card-grid"></div>
</div>

<div id="detail-view">
    <div class="back-btn" id="gallery-back-btn">← 갤러리로</div>
    <h1 id="detail-title"></h1>
    <div class="content-body" id="detail-content"></div>
</div>

<script>
    const episodes = [
        { title: "EP.1 줌-인, 집중하면 보이는 것들", excerpt: "무엇에 초점을 맞춰야 하는지 배우며 온보딩의 첫 장을 열다.", text: `안녕하세요. 단지플랫폼 <b>김승연 사회복지사</b>입니다. 제 온보딩 프로젝트의 이름은 <b>「줌-인, 집중하면 보이는 것들」</b>입니다.

<img src='p1.png'>
카메라 렌즈를 가까이 당겨 피사체에 초점을 맞추는 것처럼, 사회복지사로서 제가 <b>바라보아야 할 것들에 더욱 집중</b>하고 싶다는 마음에서 시작된 이름입니다.

<img src='p2.png'>
입사 후 저는 저소득 어르신 급식지원사업을 담당하며 다양한 일상을 마주했습니다. 정신없이 흘러가는 하루를 보내다 보니 어느덧 <b>입사 6주 차</b>에 접어들게 되었습니다.

그 시간 속에서 저는 한 가지 질문을 스스로에게 던지게 되었습니다. <b>"지금의 나에게 가장 필요한 역량은 무엇일까?"</b> 고민 끝에 내린 답은 두 가지였습니다.

첫 번째는 <b>주어진 일을 꼼꼼하고 차분하게 수행하는 힘</b>이었습니다.
두 번째는 사람과 상황을 <b>강점의 관점으로 바라보는 힘</b>이었습니다.
<img src='p3.jpg'>
저는 <b>'메모하기'</b>를 통해 업무 흐름을 구조화하기 시작했습니다. 또한 슈퍼비전을 통해 <b>무엇에 집중해야 하는지 초점을 맞추는 연습</b>을 했습니다.

<img src='p4.png'>
사진첩을 살펴보며 <b>강점은 특별한 곳에 있는 것이 아니라 관심을 가지고 바라볼 때 비로소 보이는 것</b>임을 깨달았습니다. 앞으로도 저는 번오마을 안에서 <b>사람들의 강점과 가능성을 발견하는 사회복지사</b>로 성장하겠습니다.` },
        { title: "EP.2 마을 안으로 들어가기", excerpt: "익숙한 마을을 새롭게 바라보며 주민의 일상 속으로 한 걸음 들어가다.", text: `이번 주 주제는 <b>‘마을 안으로 들어가기’</b>였습니다.

<video src='v.1.mp4' controls></video>
익숙하다고 생각했던 마을을 <b>새로운 시선으로 바라보고 탐색</b>해보는 시간을 가졌습니다. 단지플랫폼 동기들과 진행한 <b>‘컬러워크 마을활동’</b>을 통해 노란색을 찾아다니며 마을을 재발견했습니다.

<img src='p.6.png'>
<b>새로움은 멀리 있는 것이 아니라 관심을 가지고 바라볼 때 비로소 발견된다</b>는 것을 배웠습니다.

<img src='p.7.png'>
늘 같은 길을 걷고 있지만, 시선을 조금만 달리하니 마을은 <b>전혀 다른 모습으로 다가왔습니다.</b> 익숙한 공간 속에서도 계속해서 새로운 이야기를 만날 수 있다는 <b>설렘</b>을 느꼈습니다.` },
        { title: "EP.3 문제 너머를 발견하기", excerpt: "문제를 해결하는 것을 넘어 배우는 사회복지사가 되기로 결심하다.", text: `입사한 뒤 제 말버릇이 하나 생겼습니다. 

<img src='p.8.png'> 바로 <b>"큰일 났어요."</b>였습니다. 새로운 업무를 맡거나 예상하지 못한 상황을 마주할 때면, 저도 모르게 이 말부터 먼저 나오곤 했습니다. 

그 한마디를 들으면 복잡했던 머릿속이 조금씩 정리되기 시작했습니다. 함께 상황을 살펴보고, 하나씩 방법을 찾아가다 보면 어느새 <b>큰일이라고 생각했던 일도 해결</b>되어 있었습니다.

저는 문제를 해결하는 방법보다, <b>문제를 마주하는 경험이 부족했던 사람</b>이었습니다. 그래서 해결책을 찾는 대신 시선을 바꿔 보기로 했습니다. <b>'어떻게 해결하지?'</b>가 아니라, <b>'왜 이런 상황이 생겼을까?', '이 안에서 나는 무엇을 배울 수 있을까?'</b>

<img src='p.9.png'>
이제 저는 문제를 만나면 답을 찾기보다 <b>이유를 이해하려고 노력</b>하게 되었습니다. 
여전히 <b>"큰일 났어요."</b>를 외치지만, 이제 그 말 끝에는 <b>'이번에는 무엇을 배울 수 있을까?'</b>라는 질문이 함께합니다. <b>배우기를 멈추지 않는 사회복지사</b>로 성장해 가고 싶습니다.` },
        { title: "EP.4 관계의 가능성 발견하기", excerpt: "작은 인사와 관심이 관계의 시작이 된다는 것을 배우다.", text: `이번 주 주제는 <b>'관계의 가능성 발견하기'</b>입니다.

<img src='p.10.png'> 
첫 사진은 손정현 선생님과 마을을 걷던 날입니다. 그날의 작은 사건도 결국 한 사람과 마주 보고 함께 웃을 수 있었던 <b>관계의 시작</b>이었습니다.

<img src='p.11.png'> 
시간이 지날수록 발표에 대한 부담도 있었지만, 걷기모임 어머님들을 만나고 인사를 나누며 <b>관계는 하루아침에 만들어지는 것이 아님</b>을 느꼈습니다.

<img src='p.12.png'>
출석체크 시 이름표를 붙였던 작은 변화가 어르신들과 한 걸음 더 가까워질 수 있는 계기가 되었습니다. <b>관계는 거창한 것에서 시작되는 것이 아니라 먼저 인사를 건네는 작은 관심에서 시작</b>됩니다.

<img src='p.13.png'>
사진 한 장에는 풍경뿐만 아니라 사람과 관계의 흔적도 담깁니다. 앞으로도 <b>만남 속에 담긴 관계의 가능성을 발견</b>하겠습니다.` },
        { title: "EP.5 조직, 함께라는 힘을 발견하기", excerpt: "혼자가 아닌 함께할 때 더 큰 힘이 만들어진다는 것을 경험하다.", text: `첫 경로식당 생신잔치를 준비하며 다사다난한 하루를 보냈습니다.

<video src='v.2.mp4' controls></video>
영상 속에는 생신잔치 당시 보지 못했던 많은 분의 응원이 담겨 있었습니다. <b>서로의 역할을 믿고 함께 움직이는 것이 조직</b>임을 알게 되었습니다.

<img src='p.14.png'>
이 사진에는 서로의 역할을 믿고 움직이는 우리 조직의 모습이 그대로 담겨 있었습니다. <b>경로식당 어르신들 역시 같은 목표를 향해 함께 만들어 가는 하나의 조직</b>이었습니다.

<b>서로를 신뢰하고 부족한 부분을 채워줄 때 비로소 조직은 힘을 발휘</b>합니다. 저 역시 누군가에게 <b>든든한 동료</b>가 되고 싶습니다.` },
        { title: "EP.6 변화와 성장 발견하기", excerpt: "실행하고 돌아보는 과정 속에서 성장은 자연스럽게 따라온다.", text: `이번 이야기는 <b>「변화와 성장 발견하기」</b>입니다. 
<video src='v.3.mp4' controls></video>
지도점검을 준비하며 완벽하게 준비된 뒤 시작하는 대신, <b>시작하면서 배우는 것</b>을 택했습니다.

<img src='p.15.png'>
PDCA 사이클을 현장에서 직접 경험하며, 업무를 수행하는 방식을 배웠습니다. <b>완벽해서 시작하는 것이 아니라, 부딪히며 조금씩 더 나아지는 과정 자체가 성장</b>이라는 것을 몸으로 느꼈습니다.

<img src='p.16.png'>
앞으로도 <b>계획하고, 실행하고, 점검하고, 다시 개선하는 과정</b>을 반복하며 작은 변화를 차곡차곡 쌓아가겠습니다.` },
        { title: "EP.7 줌-아웃, 함께 보게 된 것들.", excerpt: "초점을 맞추며 걸어온 끝에서 사람과 마을, 그리고 나를 발견하다.", text: `마지막 이야기는 <b>「줌-아웃, 함께 보게 된 것들」</b>입니다. 

<img src='p.17.png'>
업무, 사람, 조직, 마을에 집중하며 달려온 세 달이었습니다.

<img src='p.18.png'>
걷는 시간이 길어질수록 <b>보이지 않던 것들이 눈에 들어오기 시작</b>했습니다. 마을은 늘 제 곁에서 저를 기다리고 있었습니다.

<img src='p.19.png'>
가장 선명하게 남아 있는 것은 업무가 아니라 <b>사람</b>이었습니다. 혼자 잘하는 것보다 <b>사람의 강점을 발견하고 함께 성장</b>하고 싶습니다.

렌즈를 가까이 당겨 집중하는 시간도 필요하지만, <b>때로는 물러나 넓게 바라보는 일도 중요</b>하다는 것을 배웠습니다.

<b>"초점을 맞추며 걸어온 끝에서, 우리는 함께 더 넓은 세상을 보게 되었다."</b>` }
    ];

    const hero = document.getElementById('hero-view');
    const gallery = document.getElementById('gallery-view');
    const detail = document.getElementById('detail-view');
    const grid = document.getElementById('card-grid');

    document.getElementById('begin-btn').onclick = () => { hero.style.display = 'none'; gallery.style.display = 'block'; };
    document.getElementById('home-back-btn').onclick = () => { gallery.style.display = 'none'; hero.style.display = 'flex'; };
    document.getElementById('gallery-back-btn').onclick = () => { detail.style.display = 'none'; gallery.style.display = 'block'; };

    episodes.forEach(ep => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<h3>${ep.title}</h3><p>${ep.excerpt}</p>`;
        card.onclick = () => {
            gallery.style.display = 'none';
            detail.style.display = 'block';
            document.getElementById('detail-title').innerText = ep.title;
            document.getElementById('detail-content').innerHTML = `<div>${ep.text}</div>`;
            window.scrollTo(0, 0);
        };
        grid.appendChild(card);
    });
</script>
</body>
</html>
